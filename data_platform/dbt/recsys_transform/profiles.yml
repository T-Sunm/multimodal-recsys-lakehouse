recsys_transform:
  target: dev
  outputs:
    dev:
      type: spark
      method: thrift
      host: spark-thrift
      port: 10001
      schema: recsys
      threads: 4
      connect_retries: 3
    local:
      type: spark
      method: thrift
      host: localhost
      port: 10001
      schema: recsys
      threads: 4
      connect_retries: 3
