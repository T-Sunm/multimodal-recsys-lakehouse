version: '3.8'

services:
  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.2-java
    container_name: nessie
    environment:
      # Version store — JDBC backed by PostgreSQL
      - NESSIE_VERSION_STORE_TYPE=JDBC
      - NESSIE_VERSION_STORE_PERSIST_JDBC_DATASOURCE=postgresql
      - QUARKUS_DATASOURCE_POSTGRESQL_JDBC_URL=jdbc:postgresql://postgres_container:5432/nessie
      - QUARKUS_DATASOURCE_POSTGRESQL_USERNAME=postgres
      - QUARKUS_DATASOURCE_POSTGRESQL_PASSWORD=changeme

      # Health and management
      - QUARKUS_HTTP_PORT=19120

      # ── Iceberg REST catalog configuration ────────────────────────────────
      - NESSIE_CATALOG_DEFAULT_WAREHOUSE=datalake
      - NESSIE_CATALOG_WAREHOUSES_DATALAKE_LOCATION=s3://datalake/iceberg/

      # ── S3/MinIO credentials (APPLICATION_GLOBAL = use AWS SDK env chain) ──
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT=http://minio:9000
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION=us-east-1
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS=true
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_AUTH_TYPE=APPLICATION_GLOBAL
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes:
      - ./application.properties:/deployments/config/application.properties:ro
    ports:
      - "19120:19120"
      - "9010:9000"
    networks:
      - data_platform_net
    restart: unless-stopped

networks:
  data_platform_net:
    external: true
    name: data_platform_net
