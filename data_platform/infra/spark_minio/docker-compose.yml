services:
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-master
    hostname: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8081:8080"
      - "4040:4040"
    environment:
      - SPARK_PUBLIC_DNS=localhost
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - ./spark_conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./data:/opt/spark/data
      - ../../spark/jobs:/opt/spark/jobs
      - ../../spark/configs:/opt/spark/configs
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-worker-1
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8082:8081"
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=4G
      - SPARK_PUBLIC_DNS=localhost
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - ./spark_conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./data:/opt/spark/data
      - ../../spark/jobs:/opt/spark/jobs
    networks:
      - data_network
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z # bản cuối cùng còn đầy đủ tính năng admin UI.
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    networks:
      - data_network

  spark-thrift:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-thrift
    user: root
    command: >
      /opt/spark/bin/spark-submit
      --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2
      --master spark://spark-master:7077
      --total-executor-cores 1
      --hiveconf hive.server2.thrift.port=10001
      --hiveconf hive.server2.thrift.bind.host=0.0.0.0
      /opt/spark/jars/spark-hive-thriftserver_2.12-3.5.3.jar
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "10001:10001"
    environment:
      - SPARK_PUBLIC_DNS=localhost
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - ./spark_conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./data:/opt/spark/data
      - ../../spark/jobs:/opt/spark/jobs
    networks:
      - data_network
networks:
  data_network:
    external: true
    name: data_platform_net
