connector.name=iceberg

# Nessie Iceberg REST catalog (Nessie 0.60+ exposes /iceberg/v1)
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://nessie_container:19120/iceberg/v1
iceberg.rest-catalog.warehouse=s3://datalake/iceberg/
iceberg.rest-catalog.prefix=main

# Disable vended credentials — MinIO không hỗ trợ STS
iceberg.rest-catalog.vended-credentials-enabled=false

# S3 / MinIO storage (native-s3 cho MinIO)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.region=us-east-1
