version: 2

models:
  - name: dim_weather_profile
    columns:
      - name: weather_profile_key
        data_tests: [not_null, unique]

  - name: fact_store_weather_daily
    columns:
      - name: date
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date
      - name: store_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: weather_profile_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_weather_profile')
              field: weather_profile_key
