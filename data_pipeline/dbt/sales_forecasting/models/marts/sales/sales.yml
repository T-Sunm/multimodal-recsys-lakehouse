version: 2

models:
  - name: dim_date
    columns:
      - name: date
        data_tests: [not_null, unique]

  - name: dim_store
    columns:
      - name: store_id
        data_tests: [not_null, unique]
      - name: station_id
        data_tests: [not_null]

  - name: dim_item
    columns:
      - name: item_id
        data_tests: [not_null, unique]

  - name: fact_sales_item_daily
    columns:
      - name: date
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date
      - name: store_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: item_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_item')
              field: item_id
